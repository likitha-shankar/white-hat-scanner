name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Self-scan must be clean (no findings in the engine's own code)
        run: |
          node src/index.js src --json --memory /tmp/ci-mem.md > /tmp/ci-self.json 2>/dev/null || true
          node -e "const d=require('/tmp/ci-self.json'); if(d.confirmed.length||d.unconfirmed.length){console.error('self-scan not clean:',JSON.stringify([...d.confirmed,...d.unconfirmed].map(f=>f.class)));process.exit(1)} else console.log('self-scan clean')"
